name = "jobsscrapper-gemini-relay"
main = "worker.js"
compatibility_date = "2024-11-01"

# Workers free tier: 100,000 requests/day — far more than this bot needs.
# No [vars] here on purpose: RELAY_SECRET must be set as an encrypted secret, never
# committed in plaintext. Set it with:
#   wrangler secret put RELAY_SECRET
